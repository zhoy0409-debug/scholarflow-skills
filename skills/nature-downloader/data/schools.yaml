# 维护提示：
# 1. CARSI 入口查询：https://www.carsi.edu.cn/（成员机构列表）
# 2. 各校 SSO 域名通常为 id.xxx.edu.cn / cas.xxx.edu.cn / sso.xxx.edu.cn
# 3. 准确性无法保证，向导会做连通性自检，失败时引导用户修正
# 4. 新增学校格式参考上述条目，aliases 尽量包含中英文缩写
