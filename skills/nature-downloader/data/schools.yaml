# 预设学校库
# 随 skill 分发，覆盖 CARSI 公开接入名单中的主要高校
# 维护者文档见 docs/maintainers.md
version: 1

# 字段说明：
#   name:        学校全称
#   aliases:     别名列表（中英文缩写），用于模糊匹配
#   auth.type:   cas | jaccount | sso | custom
#   auth.sso_domain: 统一身份认证域名
#   auth.carsi_entry: CARSI 联邦认证入口 URL（无则留空）
#   proxy.type:  ezproxy | null
#   proxy.ezproxy_url: EZproxy 登录地址（无则留空）
#   libraries:   该校订阅的、走机构权限的数据库清单
#   notes:       特殊提示

schools:
  # ========== C9 联盟 ==========
  - name: 上海交通大学
    aliases: [SJTU, sjtu, 交大, 上海交大]
    auth:
      type: jaccount
      sso_domain: jaccount.sjtu.edu.cn
      carsi_entry: "https://jaccount.sjtu.edu.cn/"
    discovery:
      web_of_science_url: "https://webofscience.clarivate.cn/wos/woscc/basic-search"
    libraries: [IEEE Xplore, Web of Science, 知网, ScienceDirect, Springer, ACS]
    notes: "CARSI 入口需通过 jaccount 登录后跳转"

  - name: 清华大学
