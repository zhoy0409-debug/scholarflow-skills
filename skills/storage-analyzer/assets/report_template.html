<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Storage Analysis Report</title>
<style>
  :root {
    --bg: #f6f7f9;
    --card: #ffffff;
    --ink: #1d2129;
    --muted: #6b7280;
    --line: #e5e7eb;
    --green: #16a34a;
    --yellow: #d97706;
    --red: #dc2626;
    --blue: #2563eb;
    --shadow: 0 1px 3px rgba(15,23,42,.08), 0 14px 36px rgba(15,23,42,.06);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 32px 18px 64px;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    line-height: 1.55;
  }
  .wrap { max-width: 1080px; margin: 0 auto; }
  header { margin-bottom: 24px; }
  h1 { margin: 0; font-size: 28px; letter-spacing: 0; }
  h2 { margin: 0 0 12px; font-size: 18px; }
  .meta { margin-top: 6px; color: var(--muted); font-size: 13px; }
  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 8px;
    box-shadow: var(--shadow);
    padding: 20px;
    margin-bottom: 18px;
  }
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 14px; }
  .stat span { display: block; color: var(--muted); font-size: 12px; }
  .stat strong { display: block; margin-top: 4px; font-size: 20px; font-variant-numeric: tabular-nums; }
  .bar { height: 14px; background: var(--line); border-radius: 999px; overflow: hidden; margin: 14px 0 4px; }
  .bar i { display: block; height: 100%; background: linear-gradient(90deg, #2563eb, #60a5fa); }
  table { width: 100%; border-collapse: collapse; background: var(--card); border: 1px solid var(--line); border-radius: 8px; overflow: hidden; }
  th, td { padding: 11px 12px; border-bottom: 1px solid var(--line); text-align: left; font-size: 13px; vertical-align: top; }
  th { background: #f9fafb; color: var(--muted); font-weight: 600; }
  tr:last-child td { border-bottom: 0; }
  code { font-family: ui-monospace, SFMono-Regular, Consolas, monospace; font-size: 12px; color: #374151; }
  .pill { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 12px; font-weight: 600; }
  .green { background: #dcfce7; color: #166534; }
  .yellow { background: #fef3c7; color: #92400e; }
  .red { background: #fee2e2; color: #991b1b; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 14px; }
  ul { margin: 8px 0 0 20px; padding: 0; }
  li { margin: 4px 0; }
  .muted { color: var(--muted); }
  footer { margin-top: 28px; text-align: center; color: var(--muted); font-size: 12px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Storage Analysis Report</h1>
    <div class="meta" id="meta"></div>
  </header>
  <main id="app"></main>
  <footer>Generated by storage-analyzer</footer>
</div>
<script>
const DATA = __REPORT_DATA__;
const DELETE = __DELETE_CONFIG__;
const esc = (value) => String(value ?? "").replace(/[&<>"]/g, ch => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[ch]));
const gb = (value) => {
  const m = String(value ?? "").match(/([\d.]+)/);
  return m ? Number(m[1]) : 0;
};
const rows = (items = []) => items.map(item => `
  <tr>
    <td><span class="pill ${esc(item.tier || "green")}">${esc(item.tier || "review")}</span></td>
    <td>${esc(item.size || item.size_estimate || "")}</td>
    <td>${esc(item.name || item.type || "")}</td>
    <td><code>${esc(item.path || "")}</code></td>
    <td>${esc(item.note || item.why_manual || item.risk || item.why_keep || "")}</td>
  </tr>`).join("");
function render() {
  const s = DATA.system || {};
  const summary = DATA.summary || {};
  const used = gb(s.disk_used);
  const total = gb(s.disk_total) || 1;
  document.getElementById("meta").textContent =
    `Generated ${DATA.generated_at || "recently"} · Scan time ${DATA.scan_seconds || "n/a"} seconds`;
  document.getElementById("app").innerHTML = `
    <section class="card">
      <h2>Disk Overview</h2>
      <div class="stats">
        <div class="stat"><span>Disk</span><strong>${esc(s.disk_name || "Primary")}</strong></div>
        <div class="stat"><span>Total</span><strong>${esc(s.disk_total || "n/a")}</strong></div>
        <div class="stat"><span>Used</span><strong>${esc(s.disk_used || "n/a")}</strong></div>
        <div class="stat"><span>Free</span><strong>${esc(s.disk_free || "n/a")}</strong></div>
      </div>
      <div class="bar"><i style="width:${Math.min(100, used / total * 100).toFixed(1)}%"></i></div>
      <p class="muted">${esc(summary.overview || "Review the largest items first, then decide what can be archived, moved, or deleted.")}</p>
    </section>
    <section class="card">
      <h2>Top Space Consumers</h2>
      <table>
        <thead><tr><th>Tier</th><th>Size</th><th>Name</th><th>Path</th><th>Recommendation</th></tr></thead>
        <tbody>${rows(DATA.top5 || []) || '<tr><td colspan="5" class="muted">No top items were provided.</td></tr>'}</tbody>
      </table>
    </section>
    <section class="grid">
      ${bucket("Green: Safe Cleanup", DATA.green, "green")}
      ${bucket("Yellow: Review Manually", DATA.yellow, "yellow")}
      ${bucket("Red: Keep or Handle Carefully", DATA.red, "red")}
    </section>
    <section class="card">
      <h2>Next Actions</h2>
      ${list(summary.priority || ["Start with green items.", "Open yellow items before deleting.", "Keep red items unless you know the owning application."])}
    </section>`;
}
function list(items) {
  return `<ul>${items.map(item => `<li>${esc(item)}</li>`).join("")}</ul>`;
}
function bucket(title, items = [], klass) {
  return `<section class="card"><h2><span class="pill ${klass}">${esc(title)}</span></h2>${
    items.length ? list(items.map(item => `${item.name || item.path || "Item"} — ${item.size || item.size_estimate || ""}`)) : '<p class="muted">No items in this tier.</p>'
  }</section>`;
}
render();
</script>
</body>
</html>
