# 仓库健康检查 —— 每一条都对应一个**已经发布出去过**的 bug。
#
#   check_health      15 个 skill 被模板重生成成了空壳。manifest 还在、400KB references 还在，
#                     但没有一行指令让模型去读它们。后来又扫出 14 个 —— 因为第一版检查
#                     **只查了我记得去看的地方**。一个只检查你想到要看的地方的 CI，
#                     比没有 CI 更危险：它给你假的安全感。
#   check_xrefs       skill 正文里互相点名。删一个 skill，那些点名就悬空，
#                     而模型会照着去调一个不存在的 skill。
#   check_docs        删了 11 个 skill，README 还在让人用它们。
#   check_readme_sync 双语 README 会漂移 —— 改了英文忘了中文。
#   sync_shared       shared/ 和 skills/_shared/ 曾是 9 份逐字节相同的复制品。
#   gen_index         手写的索引必然过期。
#   gates/tests       门禁本身也会坏。
#
# 全是静态可查的。本该被机器拦住，而不是几个月后被人翻出来。
name: health
on: [push, pull_request]
jobs:
  health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install pyyaml pytest pillow

      - name: skill 不是空壳，frontmatter 合法，manifest 无断链
        run: python3 tools/check_health.py --root .
      - name: skill 之间没有悬空的交叉引用
        run: python3 tools/check_xrefs.py --root .
      - name: 文档没有推荐不存在的 skill
        run: python3 tools/check_docs.py --root .
      - name: 双语 README 同步
        run: python3 tools/check_readme_sync.py --root .
      - name: shared/ 与 skills/_shared/ 一致
        run: python3 tools/sync_shared.py check --root .
      - name: SKILL_INDEX 是最新的
        run: |
          python3 tools/gen_index.py --root .
          git diff --exit-code SKILL_INDEX.md || {
            echo "SKILL_INDEX.md 过期了。跑：python3 tools/gen_index.py --root ."
            exit 1; }
      - name: 门禁测试
        run: python3 -m pytest gates/tests -q
