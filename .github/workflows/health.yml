# 仓库健康检查 —— 每一条都对应一个**已经发生过、而且发布给了别人**的错误。
#
#   check_health  15 个 nature-* 的 SKILL.md 被模板重生成，冲成同一份空话。
#                 后来又发现另有 14 个也是空壳 —— 因为上一版 CI 只 glob 了 nature-*。
#                 **一个只检查你记得去看的地方的 CI，比没有 CI 更危险。**
#                 还有一个 SKILL.md 的 frontmatter 没闭合（616 字节，截断在半句话），
#                 那种文件根本加载不了 —— 而它就在 main 上。
#
#   check_docs    删掉 11 个 skill 之后，README 仍然在让人用 `manuscript-writing`。
#
#   check_xrefs   skill 的正文里也在互相点名。删一个 skill，那些点名就悬空 ——
#                 **而模型会照着它去调一个不存在的 skill。**
#                 （journal-selection-advisor 就点名了已删的 paper-self-review。）
#
#   sync_shared   shared/ 和 skills/_shared/ 曾经是 9 份 md5 相同的复制品。
#
#   gen_index     手写的索引必然过期。
#
# 这六条全是**静态可查**的。它们本该被拦住，而不是几个月后被人翻出来。
name: health
on: [push, pull_request]
jobs:
  health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install pyyaml pytest pillow

      - name: skill 不是空壳，frontmatter 合法，manifest 无断链
        run: python3 tools/check_health.py --root .

      - name: 文档没有推荐不存在的 skill
        run: python3 tools/check_docs.py --root .

      - name: skill 之间没有悬空的交叉引用
        run: python3 tools/check_xrefs.py --root .

      - name: shared/ 与 skills/_shared/ 一致
        run: python3 tools/sync_shared.py check --root .

      - name: SKILL_INDEX 是最新的
        run: |
          python3 tools/gen_index.py --root .
          git diff --exit-code SKILL_INDEX.md || {
            echo "SKILL_INDEX.md 过期了。跑：python3 tools/gen_index.py --root ."
            exit 1
          }

      - name: 门禁测试
        run: python3 -m pytest gates/tests -q
