# skill 健康检查 —— 让「空壳 skill」变成一个会 fail 的 CI。
#
# 这个 CI 存在的理由：
# 曾经有一次 "Polish English publication release" 用模板重生成了全部 SKILL.md，
# 把 15 个 nature-* 的 router 协议冲成了同一份空话。manifest 还在、
# static/references 里 400KB 的内容还在 —— 但没有一行指令让模型去读它们。
# skill 变成了空壳，而且**没有任何东西发现**，就这样发布给了别人。
#
# 静态可查的东西，就不该靠人肉发现。
name: skill-health
on: [push, pull_request]
jobs:
  health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install pyyaml pytest pillow

      - name: skill 不是空壳 & manifest 无断链
        run: python3 tools/check_health.py --root .

      - name: shared/ 与 skills/_shared/ 一致
        run: python3 tools/sync_shared.py check --root .

      - name: 门禁测试
        run: python3 -m pytest gates/tests -q
